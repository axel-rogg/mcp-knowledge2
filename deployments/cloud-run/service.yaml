# Cloud Run service manifest for mcp-knowledge2 (AS-3 autonomous mode).
#
# Placeholders the deploy pipeline substitutes:
#   __PROJECT__   → GCP project id
#   __REGION__    → europe-west4 (DSGVO posture)
#   __IMAGE__     → europe-docker.pkg.dev/__PROJECT__/containers/mcp-knowledge2:<sha>
#   __SQL_INST__  → Cloud SQL connection name (PROJECT:REGION:INSTANCE)
#   __DOMAIN__    → public hostname (e.g. knowledge.example.com)
#
# Secrets are mounted via Secret Manager `secretKeyRef`. Doppler is the
# upstream source — sync via `bash deploy/gcp/sync-secrets.sh` before
# deploying. The runtime SA (knowledge-runtime@__PROJECT__) needs
# roles/secretmanager.secretAccessor + roles/cloudsql.client.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mcp-knowledge2
  annotations:
    # Restrict to external HTTPS Load Balancer for OAuth callback reachability.
    # Use 'internal-and-cloud-load-balancing' only when you have an external
    # LB in front; otherwise switch to 'all' for direct *.run.app access.
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: __SQL_INST__
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # Per-instance request concurrency. Keep this × maxScale × DATABASE_POOL_MAX
        # ≤ Cloud SQL max_connections. Default Cloud SQL db-custom-1-3840 = 100.
        run.googleapis.com/cpu-throttling: "false"
    spec:
      serviceAccountName: knowledge-runtime@__PROJECT__.iam.gserviceaccount.com
      timeoutSeconds: 60
      containerConcurrency: 80
      containers:
        - image: __IMAGE__
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          # ─── Startup probe: hold traffic until DB + blob are ready ──────────
          startupProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 5
            failureThreshold: 12      # 60s grace
            timeoutSeconds: 4
          # ─── Liveness: light /health (no DB touch) ──────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 4
          env:
            # ─── Server ────────────────────────────────────────────────────
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info

            # ─── OAuth-facade (AS-3 K3/K4) ─────────────────────────────────
            - name: SELF_OAUTH_ISSUER
              value: "https://__DOMAIN__"
            - name: GOOGLE_OAUTH_REDIRECT_URI
              value: "https://__DOMAIN__/auth/google/callback"
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom: { secretKeyRef: { name: knowledge-google-oauth-client-id, key: latest } }
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: knowledge-google-oauth-client-secret, key: latest } }
            - name: JWKS_CACHE_TTL_SECONDS
              value: "86400"
            # Optional: lock down to specific Workspace domains / emails. Set
            # the corresponding secrets in Doppler/GSM and uncomment.
            # - name: GOOGLE_HD_ALLOWLIST
            #   valueFrom: { secretKeyRef: { name: knowledge-google-hd-allowlist, key: latest } }
            # - name: ALLOWED_EMAILS
            #   valueFrom: { secretKeyRef: { name: knowledge-allowed-emails, key: latest } }

            # ─── Optional OBO from mcp-approval2 (AS-3 K7) ─────────────────
            # Uncomment + create the secret to enable proxy-mode.
            # - name: MCP_APPROVAL_JWKS_URL
            #   valueFrom: { secretKeyRef: { name: knowledge-approval-jwks-url, key: latest } }
            # - name: MCP_APPROVAL_ISSUER
            #   value: mcp-approval2

            # ─── Database ──────────────────────────────────────────────────
            # Cloud SQL via Unix socket. The user/password come from Secret Manager;
            # the DSN is split into two secrets so DATABASE_URL stays as URI form.
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: knowledge-database-url, key: latest } }
            - name: DATABASE_ADMIN_URL
              valueFrom: { secretKeyRef: { name: knowledge-database-admin-url, key: latest } }
            - name: DATABASE_POOL_MAX
              value: "10"

            # ─── Service-token (gates /v1/internal/*) ──────────────────────
            - name: SERVICE_TOKEN
              valueFrom: { secretKeyRef: { name: knowledge-service-token, key: latest } }

            # ─── KMS ───────────────────────────────────────────────────────
            - name: KMS_PROVIDER
              value: hkdf_local
            - name: KMS_MASTER_KEY_B64
              valueFrom: { secretKeyRef: { name: knowledge-kms-master-key, key: latest } }

            # ─── Blob storage — GCS via S3-Interop (HMAC keys) ─────────────
            - name: BLOB_ENDPOINT
              value: "https://storage.googleapis.com"
            - name: BLOB_REGION
              value: "europe-west4"
            - name: BLOB_BUCKET
              value: "knowledge-eu"
            - name: BLOB_PATH_STYLE
              value: "false"
            - name: BLOB_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: knowledge-blob-access-key, key: latest } }
            - name: BLOB_SECRET_KEY
              valueFrom: { secretKeyRef: { name: knowledge-blob-secret-key, key: latest } }

            # ─── Embedding provider — Vertex AI (GCP-native via ADC) ───────
            # The Vertex adapter falls back to ADC (metadata-server) when
            # neither VERTEX_SERVICE_ACCOUNT_JSON nor _PATH is set. Grant
            # roles/aiplatform.user to the runtime SA.
            - name: EMBED_PROVIDER
              value: vertex
            - name: VERTEX_PROJECT
              value: __PROJECT__
            - name: VERTEX_LOCATION
              value: europe-west4
            - name: VERTEX_MODEL
              value: text-multilingual-embedding-002
            # To use Cloudflare Workers AI instead (multilingual bge-m3, 1024-dim),
            # flip EMBED_PROVIDER=cloudflare and uncomment the four lines below.
            # - name: CLOUDFLARE_ACCOUNT_ID
            #   valueFrom: { secretKeyRef: { name: knowledge-cf-account-id, key: latest } }
            # - name: CLOUDFLARE_API_TOKEN
            #   valueFrom: { secretKeyRef: { name: knowledge-cf-api-token, key: latest } }
            # - name: CLOUDFLARE_AI_GATEWAY_ID
            #   value: mcp-knowledge2
            # - name: CLOUDFLARE_AI_MODEL
            #   value: "@cf/baai/bge-m3"

            # ─── Backup ────────────────────────────────────────────────────
            - name: BACKUP_MASTER_KEY
              valueFrom: { secretKeyRef: { name: knowledge-backup-master, key: latest } }
            - name: BACKUP_BUCKET
              value: "knowledge-backup-eu"
            - name: BACKUP_RETENTION_DAYS
              value: "30"
  traffic:
    - percent: 100
      latestRevision: true
