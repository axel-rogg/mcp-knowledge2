name: deploy

# Manual-only until GCP_WIF_PROVIDER + GCP_DEPLOY_SA + GCP_PROJECT + related
# secrets are configured in the repo. Once they're set, an additional
# trigger can be added (e.g. push tag 'v*' or push with '[deploy]' marker).
on:
  workflow_dispatch:

jobs:
  cloud-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: build & push image
        run: |
          gcloud auth configure-docker europe-docker.pkg.dev --quiet
          IMAGE=europe-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/containers/mcp-knowledge2:${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: apply migrations
        env:
          DATABASE_ADMIN_URL: ${{ secrets.PROD_DATABASE_ADMIN_URL }}
        run: |
          npm ci
          npm run db:migrate

      - name: deploy to cloud-run
        run: |
          sed "s|europe-docker.pkg.dev/PROJECT/containers/mcp-knowledge2:LATEST|${{ env.IMAGE }}|g" \
            deployments/cloud-run/service.yaml > /tmp/service.yaml
          gcloud run services replace /tmp/service.yaml \
            --region=europe-west4
