# fly.toml — mcp-knowledge2
#
# Storage + Sharing + Hybrid-Search service.
#
# AS-3 mode (autonomous): KC2 verifies user JWTs via two issuers — Google
# OIDC (well-known) and its own OAuth-facade (/.well-known/jwks.json served
# from in-process signing_keys). The legacy mcp-approval2 OBO bridge is
# optional; enable by setting MCP_APPROVAL_JWKS_URL as a secret.
#
# Region: fra (Frankfurt). DSGVO posture — keep data in EU.
# Postgres: attached via `fly postgres attach` (sets DATABASE_URL secret).
# pgvector: enabled manually after `fly postgres create` — see
#   deploy/fly/deploy.sh step 2.
# Secrets: managed in Doppler (project=mcp-knowledge2, config=prd_fly).
#   Sync to Fly with `bash deploy/fly/sync-secrets.sh`.

app             = "mcp-knowledge2"
primary_region  = "fra"
kill_signal     = "SIGINT"
kill_timeout    = "30s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Apply any new drizzle migrations against the freshly-attached Postgres
  # before swapping traffic to the new release. Migration files live in
  # /app/drizzle/migrations inside the image (see Dockerfile runtime stage).
  release_command = "npm run db:migrate"
  strategy        = "rolling"

[env]
  # ─── Server ───────────────────────────────────────────────────────────
  PORT      = "8080"
  NODE_ENV  = "production"
  LOG_LEVEL = "info"

  # ─── OAuth-facade (AS-3 K3/K4) ────────────────────────────────────────
  # SELF_OAUTH_ISSUER is the public URL of this Fly app — appears as `iss`
  # in tokens KC2 issues to MCP clients, and is the base for /.well-known.
  SELF_OAUTH_ISSUER         = "https://mcp-knowledge2.fly.dev"
  GOOGLE_OAUTH_REDIRECT_URI = "https://mcp-knowledge2.fly.dev/auth/google/callback"
  # GOOGLE_OAUTH_CLIENT_ID + GOOGLE_OAUTH_CLIENT_SECRET come from Doppler.

  # Optional Workspace-`hd` allowlist + strict email whitelist (CSV, lower-cased).
  # Keep both empty in [env] — set non-empty via secret if you want to lock down.
  # GOOGLE_HD_ALLOWLIST   = ""
  # ALLOWED_EMAILS        = ""

  JWKS_CACHE_TTL_SECONDS = "86400"

  # ─── Optional OBO from mcp-approval2 (AS-3 K7) ────────────────────────
  # Uncomment + set MCP_APPROVAL_JWKS_URL secret if you want approval2 to
  # be able to proxy KC2 with X-On-Behalf-Of headers. AS-3 default: off.
  # MCP_APPROVAL_ISSUER = "mcp-approval2"

  # ─── Embedding provider — Cloudflare Workers AI (default) ─────────────
  # Multilingual bge-m3, 1024-dim. CLOUDFLARE_ACCOUNT_ID + CLOUDFLARE_API_TOKEN
  # come from Doppler.
  EMBED_PROVIDER           = "cloudflare"
  CLOUDFLARE_AI_GATEWAY_ID = "mcp-knowledge2"
  CLOUDFLARE_AI_MODEL      = "@cf/baai/bge-m3"

  # ─── KMS — hkdf_local for solo Pilot ──────────────────────────────────
  # KMS_MASTER_KEY_B64 comes from Doppler. Switch to KMS_PROVIDER=openbao
  # plus OPENBAO_* secrets once an OpenBao Transit Engine is provisioned.
  KMS_PROVIDER = "hkdf_local"

  # ─── Blob storage ─────────────────────────────────────────────────────
  # Recommended for Fly: Tigris (https://fly.storage.tigris.dev) — sits in
  # the same private network, no egress fees. All values come from Doppler.
  BLOB_PATH_STYLE = "true"

  # ─── Database pool sizing ─────────────────────────────────────────────
  DATABASE_POOL_MAX = "10"

  # ─── Backup retention ─────────────────────────────────────────────────
  BACKUP_RETENTION_DAYS = "30"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 80
    hard_limit = 120

  [[http_service.checks]]
    # /health is light (no DB/blob touch). serve() comes up before pg-boss
    # in src/server.ts so this responds immediately.
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

  [[http_service.checks]]
    # /health/ready hits the DB + blob — needs more grace because pg-boss
    # may still be starting (5s connect-timeout). Loosened to 30s.
    grace_period = "30s"
    interval     = "60s"
    method       = "GET"
    timeout      = "8s"
    path         = "/health/ready"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
  cpus   = 1

# ─── Metrics ────────────────────────────────────────────────────────────
# /metrics is exposed by prom-client (see src/observability/metrics.ts).
# Bound to the same internal port; Fly's metrics scraper will pull it.
[metrics]
  port = 8080
  path = "/metrics"
